name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      code-changed: ${{ steps.set-output.outputs.code }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.js
            **/*.jsx
            **/*.mjs
            **/*.json
            **/*.css
            **/*.scss
            **/*.sass
            package-lock.json
            app/**
            components/**
            context/**
            data/**
            libs/**
            message/**
            store/**
            public/**
            i18n/**
            .eslintrc.json
            next.config.mjs
            middleware.js
            .github/workflows/ci.yaml
            .github/workflows/cd-dev.yaml
      
      - name: Set code output
        id: set-output
        run: echo "code=${{ steps.changes.outputs.any_changed }}" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        if: steps.changes.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' 

      - name: Install dependencies
        if: steps.changes.outputs.any_changed == 'true'
        run: npm ci 

      - name: Run ESLint
        if: steps.changes.outputs.any_changed == 'true'
        run: npm run lint
        continue-on-error: false

  build:
    runs-on: ubuntu-latest
    needs: [ test ]
    if: needs.test.outputs.code-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production